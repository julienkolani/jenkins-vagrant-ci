version: '3.8'

x-common-opts: &common
  dns:
    - 127.0.0.1
    - 8.8.8.8
    - 1.1.1.1
  extra_hosts:
    - "gitea:172.18.0.6"
    - "registry:172.18.0.7"
    - "rocketchat:172.18.0.3"
    - "mongo:172.18.0.4"
    - "dind:172.18.0.2"
  labels:
    - "app.dws.scope=jenkins_test_stack"

services:

  jenkins:
    <<: *common
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: jenkins_test_stack_jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    depends_on:
      - dind
    environment:
      DOCKER_HOST: "tcp://dind:2375"
      DOCKER_TLS_VERIFY: ""
      DOCKER_CERT_PATH: ""
    volumes:
      - jenkins_test_stack_jenkins_data:/var/jenkins_home
      - jenkins_test_stack_docker_certs:/certs
    networks:
      jenkins_test_stack_net:
        ipv4_address: 172.18.0.5
    labels:
      - "app.dws.name=jenkins"

  nginx:
    <<: *common
    image: nginx:latest
    container_name: jenkins_test_stack_nginx
    restart: unless-stopped
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./conf.d/jenkins-proxy.conf:/etc/nginx/conf.d/jenkins-proxy.conf:ro
    ports:
      - "443:443"
    depends_on:
      - jenkins
    networks:
      jenkins_test_stack_net:
        ipv4_address: 172.18.0.10

  registry:
    <<: *common
    image: registry:2
    container_name: jenkins_test_stack_registry
    restart: unless-stopped
    environment:
      REGISTRY_HTTP_ADDR: 0.0.0.0:443
      REGISTRY_HTTP_TLS_CERTIFICATE: /certs/cert.pem
      REGISTRY_HTTP_TLS_KEY: /certs/key.pem
    volumes:
      - jenkins_test_stack_registry_data:/var/lib/registry
      - ./certs:/certs
    ports:
      - "5001:443"
    networks:
      jenkins_test_stack_net:
        ipv4_address: 172.18.0.7

  dind:
    <<: *common
    image: docker:dind
    container_name: jenkins_test_stack_dind
    restart: unless-stopped
    privileged: true
    command: ["--insecure-registry", "registry:443"]
    volumes:
      - jenkins_test_stack_docker_data:/var/lib/docker
      - jenkins_test_stack_jenkins_data:/var/jenkins_home
    expose:
      - "2375"
    environment:
      DOCKER_TLS_CERTDIR: ""
    networks:
      jenkins_test_stack_net:
        ipv4_address: 172.18.0.2
    labels:
      - "app.dws.name=docker"
      - "app.dws.part-of=jenkins"

  gitea:
    <<: *common
    image: gitea/gitea:latest
    container_name: jenkins_test_stack_gitea
    restart: unless-stopped
    environment:
      - "TZ=Europe/Paris"
    volumes:
      - jenkins_test_stack_gitea_data:/data
    ports:
      - "3000:3000"
      - "2222:22"
    networks:
      jenkins_test_stack_net:
        ipv4_address: 172.18.0.6

  mongo:
    <<: *common
    image: mongo:6
    container_name: jenkins_test_stack_mongo
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0"]
    volumes:
      - jenkins_test_stack_mongo_data:/data/db
    networks:
      jenkins_test_stack_net:
        ipv4_address: 172.18.0.4

  rocketchat:
    <<: *common
    image: registry.rocket.chat/rocketchat/rocket.chat:latest
    container_name: jenkins_test_stack_rocketchat
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb://mongo:27017/rocketchat?replicaSet=rs0
      - MONGO_OPLOG_URL=mongodb://mongo:27017/local?replicaSet=rs0
      - ROOT_URL=http://localhost:4000
      - PORT=4000
    ports:
      - "4000:4000"
    depends_on:
      - mongo
    networks:
      jenkins_test_stack_net:
        ipv4_address: 172.18.0.3

volumes:
  jenkins_test_stack_jenkins_data:
  jenkins_test_stack_docker_data:
  jenkins_test_stack_docker_certs:
  jenkins_test_stack_registry_data:
  jenkins_test_stack_gitea_data:
  jenkins_test_stack_mongo_data:

networks:
  jenkins_test_stack_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16
